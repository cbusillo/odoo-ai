# Variant-specific overrides for the OPW testing stack.

x-opw-env: &opw-env
  env_file:
    - .env
    - docker/config/base.env
    - docker/config/opw.env
    - docker/config/opw-testing.env

services:
  web:
    <<: *opw-env
    ports:
      - "18069:8069"
      - "18072:8072"
  database:
    <<: *opw-env
    ports:
      - "15432:5432"
  script-runner:
    <<: *opw-env
