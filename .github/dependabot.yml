---
version: 2

multi-ecosystem-groups:
  infrastructure:
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: infrastructure
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/docker"
    patterns:
      - "*"
    multi-ecosystem-group: infrastructure
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
