schema_version = 2

[defaults]
target_type = "compose"
source_git_ref = "origin/main"

[projects.primary]
project_name = "odoo-ai"

[profiles.odoo]
project = "primary"
healthcheck_enabled = true
healthcheck_path = "/web/health"

[profiles.odoo.env]
ENV_OVERRIDE_CONFIG_PARAM__WEB__BASE__URL_FREEZE = "True"
ODOO_WEB_COMMAND = "python3 /volumes/scripts/run_odoo_startup.py -c /tmp/platform.odoo.conf"

[profiles.cm]
extends = "odoo"

[profiles.opw]
extends = "odoo"
deploy_timeout_seconds = 7200
healthcheck_timeout_seconds = 600

[profiles.opw.env]
OPENUPGRADE_ENABLED = "True"

[[targets]]
profile = "cm"
context = "cm"
instance = "dev"
target_id = "7qlBWu2CYpGMMr5ssaNMa"
git_branch = "cm-dev"
auto_deploy = true
require_test_gate = false
require_prod_gate = false
domains = ["cm-dev.shinycomputers.com"]

[targets.env]
ENV_OVERRIDE_CONFIG_PARAM__WEB__BASE__URL = "https://cm-dev.shinycomputers.com"

[[targets]]
profile = "cm"
context = "cm"
