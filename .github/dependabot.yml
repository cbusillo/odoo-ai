---
version: 2

multi-ecosystem-groups:
  infrastructure:
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: infrastructure
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/docker"
    patterns:
      - "*"
    multi-ecosystem-group: infrastructure
    groups:
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: uv
    directories:
      - "/"
      - "/addons/*"
      - "/addons/*/*"
    exclude-paths:
      - "tmp/**"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - python:uv
    groups:
      python-uv:
        patterns:
          - "*"
        group-by: dependency-name
      all-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
